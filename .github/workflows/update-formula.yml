name: Update Formula

on:
  repository_dispatch:
    types: [new-release]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.1.6)"
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        # Uses the auto-supplied `secrets.GITHUB_TOKEN` (implicit when
        # no `token:` is set). The `permissions: contents: write` block
        # above grants that token push access, so we don't need a
        # long-lived Personal Access Token. The previous PAT-based
        # setup silently broke whenever the PAT expired (the v0.2.7,
        # v0.2.8, v0.2.9, and v0.3.0 dispatches all failed at the
        # checkout step until this fix landed).

      - name: Download checksums
        run: |
          VERSION="${{ github.event.client_payload.version || github.event.inputs.version }}"
          BASE="https://github.com/pcr-developers/cli/releases/download/${VERSION}"
          echo "Fetching checksums for ${VERSION}..."
          SHA_ARM64=$(curl -sL "${BASE}/pcr-macos-arm64.sha256")
          SHA_MACOS_X64=$(curl -sL "${BASE}/pcr-macos-x64.sha256")
          SHA_LINUX=$(curl -sL "${BASE}/pcr-linux-x64.sha256")
          echo "macOS arm64: ${SHA_ARM64}"
          echo "macOS x64:   ${SHA_MACOS_X64}"
          echo "Linux x64:   ${SHA_LINUX}"
          echo "SHA_ARM64=${SHA_ARM64}" >> $GITHUB_ENV
          echo "SHA_MACOS_X64=${SHA_MACOS_X64}" >> $GITHUB_ENV
          echo "SHA_LINUX=${SHA_LINUX}" >> $GITHUB_ENV

      - name: Update formula
        run: |
          VERSION="${{ github.event.client_payload.version || github.event.inputs.version }}"
          sed -e "s/{{VERSION}}/${VERSION}/g" \
              -e "s/{{SHA256_MACOS_ARM64}}/${{ env.SHA_ARM64 }}/g" \
              -e "s/{{SHA256_MACOS_X64}}/${{ env.SHA_MACOS_X64 }}/g" \
              -e "s/{{SHA256_LINUX_X64}}/${{ env.SHA_LINUX }}/g" \
              Formula/pcr.rb.template > Formula/pcr.rb

      - name: Commit and push
        # `actions/checkout@v4` already configured an authenticated
        # remote URL using the workflow's `GITHUB_TOKEN`, so we don't
        # need to rewrite the remote here. Just commit + push.
        run: |
          VERSION="${{ github.event.client_payload.version || github.event.inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/pcr.rb
          git diff --cached --quiet || git commit -m "pcr ${VERSION}"
          git push
